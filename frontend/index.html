<!DOCTYPE html>
<html lang="es-PE">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spa Glow Kitty - Enterprise</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FF2A7A',
            secondary: '#FFB6C1',
            accent: '#D4AF37',
            surface: '#FFFFFF',
            background: '#FFF0F5',
            plum: '#2D1B2E',
          },
          fontFamily: {
            sans: ['Nunito', 'sans-serif'],
          },
          boxShadow: {
            'coquette': '0 10px 40px -10px rgba(255, 42, 122, 0.08)',
            'glass': '0 8px 32px 0 rgba(255, 42, 122, 0.05)',
            'glow': '0 0 20px rgba(255, 42, 122, 0.15)',
          },
          borderRadius: {
            '4xl': '2rem',
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #FFF0F5;
      background-image: radial-gradient(rgba(255, 182, 193, 0.4) 2px, transparent 2px);
      background-size: 30px 30px;
      color: #2D1B2E;
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 182, 193, 0.8); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #FF2A7A; }
  </style>

  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
